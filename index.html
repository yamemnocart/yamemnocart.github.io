<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Quiz - YMNC</title>
    <!-- Chèn Font Awesome để lấy icon giống TikTok -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        /* Khung giao diện điện thoại giả lập TikTok */
        .tiktok-container {
            width: 100%;
            max-width: 400px;
            height: 92vh;
            background-color: #000;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2f2f2f;
        }

        /* Thanh tiến trình ở trên cùng */
        .progress-container {
            position: absolute;
            top: 15px;
            left: 10%;
            width: 80%;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            z-index: 10;
        }

        .progress-bar {
            height: 100%;
            width: 10%;
            background-color: #fff;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Vùng hiển thị Video/Nền câu hỏi */
        .video-feed {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(0deg, #1a1a2e, #16213e);
            transition: background 0.5s ease;
            padding: 20px;
        }

        /* Nút tương tác bên sườn phải kiểu TikTok */
        .side-bar {
            position: absolute;
            right: 12px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 5;
        }

        .side-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 26px;
            cursor: pointer;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .side-icon i {
            transition: transform 0.2s;
        }

        .side-icon i:active {
            transform: scale(1.2);
        }

        .side-icon span {
            font-size: 12px;
            margin-top: 4px;
            font-weight: 600;
        }

        .fa-heart { color: #fe2c55; }

        /* Khung nội dung câu hỏi & đáp án (Dưới đáy) */
        .content-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            padding-right: 70px; /* Tránh đè lên side-bar */
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            z-index: 4;
        }

        .author-tag {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .author-tag::before {
            content: '@';
        }

        .question-text {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 15px;
            font-weight: 400;
        }

        /* Danh sách nút đáp án */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            width: 100%;
        }

        .option-btn:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .option-btn:active {
            transform: scale(0.98);
            background-color: #fe2c55;
            border-color: #fe2c55;
        }

        /* Giao diện kết thúc */
        .end-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            height: 100%;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
        }

        .end-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .end-screen h2 {
            font-size: 22px;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .end-screen p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .start-btn {
            background-color: #fe2c55;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.4);
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
        }

        .start-btn:hover {
            background-color: #e12249;
            transform: scale(1.05);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
    </style>
</head>
<body>

    <div class="tiktok-container">
        <!-- Thanh tiến trình câu hỏi -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Màn hình câu hỏi chính -->
        <div class="video-feed" id="videoFeed">
            
            <!-- Nút tương tác góc phải -->
            <div class="side-bar" id="sideBar">
                <div class="side-icon">
                    <i class="fas fa-heart"></i>
                    <span>125.4K</span>
                </div>
                <div class="side-icon">
                    <i class="fas fa-comment-dots"></i>
                    <span>842</span>
                </div>
                <div class="side-icon">
                    <i class="fas fa-bookmark"></i>
                    <span>4.6K</span>
                </div>
                <div class="side-icon">
                    <i class="fas fa-share"></i>
                    <span>1.2K</span>
                </div>
            </div>

            <!-- Nội dung câu hỏi phía dưới -->
            <div class="content-overlay" id="contentOverlay">
                <div class="author-tag">ymnc_challenge</div>
                <div class="question-text" id="questionText">Đang tải câu hỏi...</div>
                
                <div class="options-group" id="optionsGroup">
                    <!-- Các nút đáp án sẽ tự động sinh ra ở đây bằng JavaScript -->
                </div>
            </div>
        </div>

        <!-- Màn hình kết thúc sau khi hoàn thành 10 câu -->
        <div class="end-screen" id="endScreen">
            <div class="end-icon">🎉</div>
            <h2>Bạn đã hoàn thành câu hỏi của ymnc!</h2>
            <p>Cảm ơn bạn đã tham gia tương tác khảo sát tính cách này. Hãy bấm vào nút bên dưới để bắt đầu đăng nhập và khám phá kênh ymnc nhé!</p>
            
            <!-- BẠN TỰ ĐIỀN ĐƯỜNG LINK CỦA BẠN VÀO CHỖ href="..." DƯỚI ĐÂY -->
            <a href="https://however-infant-velocity-detected.trycloudflare.com/login.html" class="start-btn">Bắt đầu</a>
        </div>
    </div>

    <script>
        // Danh sách 10 câu hỏi về tính cách và sở thích
        const quizData = [
            {
                q: "1. Bạn thuộc tuýp người hướng nội hay hướng ngoại?",
                a: ["Hướng nội, thích một mình", "Hướng ngoại, thích tiệc tùng", "Hướng trung (Lúc này lúc kia)"]
            },
            {
                q: "2. Thói quen khi rảnh rỗi của bạn là gì?",
                a: ["Lướt TikTok / Xem phim", "Đi cà phê với bạn bè", "Nghe nhạc / Đọc sách"]
            },
            {
                q: "3. Thức uống yêu thích của bạn mỗi sáng?",
                a: ["Cà phê sữa / Cà phê đen", "Trà sữa vị truyền thống", "Nước ép hoa quả / Nước lọc"]
            },
            {
                q: "4. Bạn thích đi du lịch ở nơi như thế nào?",
                a: ["Vùng biển đầy nắng và gió", "Đồi núi yên tĩnh, mờ sương", "Thành phố sôi động, sầm uất"]
            },
            {
                q: "5. Khi gặp áp lực, bạn chọn cách nào để giải tỏa?",
                a: ["Đi ngủ một giấc thật sâu", "Ăn sập cả thế giới", "Tâm sự với người thương/bạn thân"]
            },
            {
                q: "6. Dòng nhạc nào dễ khiến bạn 'bật mood' nhất?",
                a: ["Pop / Dance sôi động", "Lofi / Ballad nhẹ nhàng", "Rap / Hip-hop cực cháy"]
            },
            {
                q: "7. Bạn tự thấy mình là người lý trí hay tình cảm?",
                a: ["Cực kỳ lý trí và thực tế", "Sống theo con tim và tình cảm", "Cân bằng tốt cả hai"]
            },
            {
                q: "8. Thể loại phim bạn không bao giờ bỏ qua?",
                a: ["Hành động / Trinh thám", "Tình cảm lãng mạn", "Kinh dị / Giật gân"]
            },
            {
                q: "9. Bạn đánh giá cao điều gì nhất ở một người?",
                a: ["Sự chân thành, thật thà", "Sự thông minh, hài hước", "Sự tinh tế, biết quan tâm"]
            },
            {
                q: "10. Bạn thấy mức độ tò mò về bản thân của mình thế nào?",
                a: ["Rất tò mò, muốn biết ngay kết quả", "Bình thường, chơi cho vui thôi nè"]
            }
        ];

        let currentQuestionIndex = 0;

        // Mảng màu nền ngẫu nhiên giả lập hiệu ứng chuyển cảnh TikTok khác biệt
        const backgroundGradients = [
            "linear-gradient(0deg, #1a1a2e, #16213e)",
            "linear-gradient(0deg, #2c3e50, #000000)",
            "linear-gradient(0deg, #1f4037, #99f2c8)",
            "linear-gradient(0deg, #5c258d, #4389a2)",
            "linear-gradient(0deg, #111111, #323232)",
            "linear-gradient(0deg, #141e30, #243b55)",
            "linear-gradient(0deg, #1d2671, #c33764)",
            "linear-gradient(0deg, #0f2027, #203a43)",
            "linear-gradient(0deg, #3a1c1c, #000000)",
            "linear-gradient(0deg, #134e5e, #71b280)"
        ];

        const questionText = document.getElementById('questionText');
        const optionsGroup = document.getElementById('optionsGroup');
        const progressBar = document.getElementById('progressBar');
        const videoFeed = document.getElementById('videoFeed');
        const progressContainer = document.getElementById('progressContainer');
        const sideBar = document.getElementById('sideBar');
        const contentOverlay = document.getElementById('contentOverlay');
        const endScreen = document.getElementById('endScreen');

        function loadQuestion() {
            // Kiểm tra xem đã trả lời hết 10 câu chưa
            if (currentQuestionIndex >= quizData.length) {
                showEndScreen();
                return;
            }

            // Cập nhật thanh tiến trình thanh mảnh phía trên
            const progressPercent = ((currentQuestionIndex + 1) / quizData.length) * 100;
            progressBar.style.width = `${progressPercent}%`;

            // Thay đổi màu nền ngẫu nhiên tạo độ cuốn hút mới lạ
            videoFeed.style.background = backgroundGradients[currentQuestionIndex];

            // Hiển thị nội dung câu hỏi hiện tại
            const currentQuestion = quizData[currentQuestionIndex];
            questionText.innerText = currentQuestion.q;

            // Xóa đáp án cũ và nạp đáp án mới vào
            optionsGroup.innerHTML = '';
            currentQuestion.a.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.innerText = option;
                // Thêm sự kiện click để nhảy câu tiếp theo
                button.onclick = () => {
                    currentQuestionIndex++;
                    // Hiệu ứng chuyển cảnh mượt nhẹ
                    videoFeed.style.opacity = 0.5;
                    setTimeout(() => {
                        loadQuestion();
                        videoFeed.style.opacity = 1;
                    }, 200);
                };
                optionsGroup.appendChild(button);
            });
        }

        function showEndScreen() {
            // Ẩn các thành phần TikTok và hiện màn hình kết thúc đầy màu sắc
            progressContainer.style.display = 'none';
            sideBar.style.display = 'none';
            contentOverlay.style.display = 'none';
            videoFeed.style.display = 'none';
            
            endScreen.style.display = 'flex';
        }

        // Bắt đầu chạy câu hỏi đầu tiên khi vừa tải trang
        loadQuestion();
    </script>
</body>
</html>
