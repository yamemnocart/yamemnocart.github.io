<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hay YMNC</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 12px;
            background: #1e1e1e;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            margin: 15px 0;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn-simulate { background-color: #007aff; }
        .btn-simulate:active { background-color: #0056b3; }
        .info-box {
            background-color: #2c2c2e;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
            line-height: 1.5;
            color: #eaeaea;
        }
        .status {
            margin-top: 15px;
            font-weight: bold;
            color: #ff453a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>gameymncbucacdeobietchan.jetjet</h2>
        
        <div class="info-box">
            <strong>Cơ chế hoạt động:</strong><br>
            Khi bấm nút, code sẽ liên tục khởi tạo các mảng dữ liệu kiểu <code>Float64Array</code> (loại mảng chuyên dùng để tính toán ma trận AI). Việc này ép điện thoại phải cấp phát RAM liên tục cho đến khi vượt ngưỡng chịu đựng.
        </div>

        <button class="btn-simulate" onclick="simulateAILoading()">Bắt Đầu Nạp Mô Hình AI</button>
        
        <div id="statusLabel" class="status">Trạng thái: Đang chờ...</div>
    </div>

    <script>
        function simulateAILoading() {
            const statusLabel = document.getElementById('statusLabel');
            statusLabel.innerText = "Trạng thái: Đang nạp mô hình vào RAM...";
            
            // Mảng toàn cục để giữ lại dữ liệu, không cho trình duyệt tự động xóa (Garbage Collection)
            window.aiModelWeights = [];
            
            let blockCount = 0;

            // Sử dụng vòng lặp nhanh để ép hệ thống cấp phát RAM cấp tốc
            // Trên điện thoại, cơ chế quản lý RAM rất nghiêm ngặt, việc nhồi nhanh sẽ kích hoạt hiện tượng lag/văng tab
            const interval = setInterval(() => {
                try {
                    // Tạo ra một khối dữ liệu số thực tương đương khoảng 40 Megabytes mỗi lần lặp
                    let weightBlock = new Float64Array(5000000); 
                    
                    // Điền dữ liệu ngẫu nhiên mô phỏng các tham số AI
                    for (let i = 0; i < weightBlock.length; i += 100) {
                        weightBlock[i] = Math.random();
                    }
                    
                    // Đẩy vào mảng lưu trữ cố định để chiếm giữ RAM
                    window.aiModelWeights.push(weightBlock);
                    blockCount++;
                    
                    statusLabel.innerText = `Đã nạp: ~( ${(blockCount * 40)} MB ) vào RAM.`;
                    
                } catch (e) {
                    // Nếu RAM bị cạn kiệt hoàn toàn và trình duyệt chưa bị sập, nó sẽ quăng ra lỗi này
                    clearInterval(interval);
                    statusLabel.innerText = "Lỗi: Trình duyệt từ chối cấp thêm RAM (Out of Memory)!";
                    alert("Điện thoại đã hết RAM sạch để chạy!");
                }
            }, 10); // Thực hiện cực nhanh sau mỗi 10 mili-giây
        }
    </script>
</body>
</html>
